<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Login - Six7 Invoicing</title>
  
  <!-- Tailwind CSS (CDN warning is normal for dev) -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <!-- ✅ Supabase JS SDK - MUST load BEFORE our config.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Tailwind Config -->
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0A2540",
            "primary-container": "#001c37",
            "primary-fixed": "#d2e4ff",
            "on-primary": "#ffffff",
            "surface": "#f7fafc",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f1f4f6",
            "on-surface": "#181c1e",
            "on-surface-variant": "#43474d",
            "outline-variant": "#c4c6ce",
            "error": "#ba1a1a",
            "on-error": "#ffffff"
          },
          fontFamily: { "sans": ["Inter", "sans-serif"] },
          borderRadius: { "xl": "0.75rem" }
        },
      },
    }
  </script>

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      background-color: #f7fafc;
      background-image: 
        radial-gradient(at 0% 0%, rgba(210, 228, 255, 0.4) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(209, 228, 251, 0.3) 0px, transparent 50%);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
  </style>
</head>

<body class="text-on-surface min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-[440px] flex flex-col items-center">
    
    <!-- Brand Identity -->
    <div class="mb-8 md:mb-10 text-center">
      <div class="w-16 h-16 md:w-20 md:h-20 bg-primary rounded-xl md:rounded-full flex items-center justify-center mb-4 md:mb-6 mx-auto shadow-lg shadow-primary/20">
        <span class="material-symbols-outlined text-on-primary text-3xl md:text-4xl">account_balance_wallet</span>
      </div>
      <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-primary mb-2">Six7 Invoicing</h1>
      <p class="text-sm md:text-base text-on-surface-variant font-medium">Precision Invoicing for Sri Lankan SMEs</p>
    </div>

    <!-- Login Card -->
    <div class="w-full bg-surface-container-lowest rounded-xl md:rounded-2xl p-6 md:p-10 shadow-[0_20px_40px_rgba(0,15,34,0.04)] border border-outline-variant/20">
      
      <!-- Toggle: Login / Signup -->
      <div class="flex mb-6 bg-surface-container-low rounded-lg p-1">
        <button id="tab-login" class="flex-1 py-2 text-sm font-bold rounded-md bg-white text-primary shadow-sm transition-all">Sign In</button>
        <button id="tab-signup" class="flex-1 py-2 text-sm font-bold rounded-md text-on-surface-variant hover:text-on-surface transition-all">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="space-y-5">
        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="login-email">Email Address</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant/60">mail</span>
            </div>
            <!-- ✅ Added autocomplete -->
            <input class="block w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-0 rounded-xl text-on-surface font-medium focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="login-email" type="email" placeholder="name@business.lk" required autocomplete="email"/>
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex items-center justify-between px-1">
            <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="login-password">Password</label>
            <a class="text-xs font-bold text-primary hover:underline" href="#">Forgot Password?</a>
          </div>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant/60">lock</span>
            </div>
            <!-- ✅ Added autocomplete -->
            <input class="block w-full pl-12 pr-12 py-3.5 bg-surface-container-low border-0 rounded-xl text-on-surface font-medium focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="login-password" type="password" placeholder="••••••••" required autocomplete="current-password"/>
            <button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant/60 hover:text-primary transition-colors" type="button" id="toggle-password">
              <span class="material-symbols-outlined">visibility</span>
            </button>
          </div>
        </div>

        <button class="w-full py-3.5 bg-primary text-on-primary rounded-xl font-bold text-base shadow-lg hover:shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit" id="login-btn">
          <span>Sign In</span>
          <span class="material-symbols-outlined text-xl">arrow_forward</span>
        </button>
      </form>

      <!-- Signup Form (Hidden by default) -->
      <form id="signup-form" class="space-y-5 hidden">
        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="signup-business">Business Name</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant/60">business</span>
            </div>
            <input class="block w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-0 rounded-xl text-on-surface font-medium focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="signup-business" type="text" placeholder="Six7 Solutions" required/>
          </div>
        </div>
        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="signup-email">Email Address</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant/60">mail</span>
            </div>
            <input class="block w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-0 rounded-xl text-on-surface font-medium focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="signup-email" type="email" placeholder="name@business.lk" required autocomplete="email"/>
          </div>
        </div>
        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="signup-password">Password</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant/60">lock</span>
            </div>
            <input class="block w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-0 rounded-xl text-on-surface font-medium focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="signup-password" type="password" placeholder="••••••••" required autocomplete="new-password"/>
          </div>
        </div>
        <button class="w-full py-3.5 bg-primary text-on-primary rounded-xl font-bold text-base shadow-lg hover:shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit" id="signup-btn">
          <span>Create Account</span>
          <span class="material-symbols-outlined text-xl">add_circle</span>
        </button>
      </form>

      <!-- Footer -->
      <div class="mt-8 pt-6 border-t border-outline-variant/10 text-center">
        <p class="text-xs text-on-surface-variant">
          Protected by Six7 Security. <br/>© 2026 Six7 Invoicing.
        </p>
      </div>
    </div>
  </div>

  <!-- ✅ Script Order: Config FIRST, then auth, then inline -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // UI Logic for Tabs & Password Toggle
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');
    const tabLogin = document.getElementById('tab-login');
    const tabSignup = document.getElementById('tab-signup');
    const togglePwdBtn = document.getElementById('toggle-password');

    // Toggle Forms
    tabLogin.addEventListener('click', () => {
      loginForm.classList.remove('hidden');
      signupForm.classList.add('hidden');
      tabLogin.classList.add('bg-white', 'text-primary', 'shadow-sm');
      tabLogin.classList.remove('text-on-surface-variant');
      tabSignup.classList.remove('bg-white', 'text-primary', 'shadow-sm');
      tabSignup.classList.add('text-on-surface-variant');
    });

    tabSignup.addEventListener('click', () => {
      signupForm.classList.remove('hidden');
      loginForm.classList.add('hidden');
      tabSignup.classList.add('bg-white', 'text-primary', 'shadow-sm');
      tabSignup.classList.remove('text-on-surface-variant');
      tabLogin.classList.remove('bg-white', 'text-primary', 'shadow-sm');
      tabLogin.classList.add('text-on-surface-variant');
    });

    // Password Visibility
    togglePwdBtn.addEventListener('click', function() {
      const input = document.getElementById('login-password');
      const icon = this.querySelector('.material-symbols-outlined');
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility_off';
      } else {
        input.type = 'password';
        icon.textContent = 'visibility';
      }
    });

    // Handle Login Submit
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      const originalContent = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Signing in...';
      
      await handleLogin(email, password);
      
      btn.disabled = false;
      btn.innerHTML = originalContent;
    });

    // Handle Signup Submit
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('signup-btn');
      const business = document.getElementById('signup-business').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      
      const originalContent = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Creating...';
      
      await handleSignup(email, password, business);
      
      btn.disabled = false;
      btn.innerHTML = originalContent;
    });
  </script>
</body>
</html>
