<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Sign Up - Six7 Invoicing</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0A2540", "primary-container": "#001c37", "primary-fixed": "#d2e4ff",
            "on-primary": "#ffffff", "surface": "#f7fafc", "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f1f4f6", "on-surface": "#181c1e", "on-surface-variant": "#43474d",
            "outline-variant": "#c4c6ce", "error": "#ba1a1a", "on-error": "#ffffff", "success": "#2ecc71"
          },
          fontFamily: { "sans": ["Inter", "sans-serif"] },
          borderRadius: { "xl": "0.75rem" }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { background-color: #f7fafc; background-image: radial-gradient(at 0% 0%, rgba(210, 228, 255, 0.4) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(209, 228, 251, 0.3) 0px, transparent 50%); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="text-on-surface min-h-screen flex items-center justify-center p-4 md:p-6">
  <div id="notification-area" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>
  <div class="w-full max-w-[480px] flex flex-col items-center fade-in">
    <div class="mb-6 md:mb-8 text-center">
      <div class="w-14 h-14 md:w-16 md:h-16 bg-primary rounded-xl flex items-center justify-center mb-4 mx-auto shadow-lg shadow-primary/20">
        <span class="material-symbols-outlined text-on-primary text-2xl md:text-3xl">app_registration</span>
      </div>
      <h1 class="text-xl md:text-2xl font-extrabold tracking-tight text-primary mb-1">Create Your Account</h1>
      <p class="text-sm text-on-surface-variant">Join Six7 Invoicing today</p>
    </div>
    <div class="w-full bg-surface-container-lowest rounded-xl md:rounded-2xl p-6 md:p-8 shadow-[0_20px_40px_rgba(0,15,34,0.04)] border border-outline-variant/20">
      <form id="signup-form" class="space-y-4" novalidate>
        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="business">Business Name</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant/60">business</span>
            </div>
            <input class="block w-full pl-12 pr-4 py-3 bg-surface-container-low border-0 rounded-xl text-on-surface font-medium focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="business" type="text" placeholder="Six7 Solutions" required/>
          </div>
          <p id="business-error" class="text-error text-xs px-1 hidden"></p>
        </div>
        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="name">Your Name</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant/60">person</span>
            </div>
            <input class="block w-full pl-12 pr-4 py-3 bg-surface-container-low border-0 rounded-xl text-on-surface font-medium focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="name" type="text" placeholder="Venga" required/>
          </div>
          <p id="name-error" class="text-error text-xs px-1 hidden"></p>
        </div>
        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="email">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant/60">mail</span>
            </div>
            <input class="block w-full pl-12 pr-4 py-3 bg-surface-container-low border-0 rounded-xl text-on-surface font-medium focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="email" type="email" placeholder="name@business.lk" required autocomplete="email"/>
          </div>
          <p id="email-error" class="text-error text-xs px-1 hidden"></p>
        </div>
        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="phone">Phone Number <span class="text-on-surface-variant/60 font-normal">(Optional)</span></label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant/60">phone</span>
            </div>
            <input class="block w-full pl-12 pr-4 py-3 bg-surface-container-low border-0 rounded-xl text-on-surface font-medium focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="phone" type="tel" placeholder="+94 7X XXX XXXX"/>
          </div>
        </div>
        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="password">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant/60">lock</span>
            </div>
            <input class="block w-full pl-12 pr-4 py-3 bg-surface-container-low border-0 rounded-xl text-on-surface font-medium focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="password" type="password" placeholder="••••••••" required autocomplete="new-password" minlength="6"/>
          </div>
          <p id="password-error" class="text-error text-xs px-1 hidden"></p>
          <p class="text-xs text-on-surface-variant px-1">Must be at least 6 characters</p>
        </div>
        <button class="w-full py-3.5 bg-primary text-on-primary rounded-xl font-bold text-base shadow-lg hover:shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2 disabled:opacity-50 mt-2" type="submit" id="signup-btn">
          <span>Create Account</span>
          <span class="material-symbols-outlined text-xl">add_circle</span>
        </button>
      </form>
      <div class="mt-6 pt-6 border-t border-outline-variant/10 text-center">
        <p class="text-sm text-on-surface-variant">Already have an account? <a class="font-bold text-primary hover:underline" href="/login">Sign In</a></p>
      </div>
      <div class="mt-2 text-center">
        <p class="text-xs text-on-surface-variant">© 2026 Six7 Invoicing</p>
      </div>
    </div>
  </div>
  <script>
    var CONFIG = {
      supabaseUrl: 'https://hsjhuiyyxotsyqjncvvm.supabase.co',
      supabaseKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhzamh1aXl5eG90c3lxam5jdnZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTA0MDMsImV4cCI6MjA5MDI4NjQwM30.p-CXtR_bY20n1fq8hz1hvpWu9gNT3dWPoVs7NNiwhRY',
      redirectAfterSignup: '/dashboard'
    };
    var supabaseClient = null;
    if (typeof window.supabase !== 'undefined') {
      supabaseClient = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);
    }
    var form = document.getElementById('signup-form');
    var businessInput = document.getElementById('business');
    var nameInput = document.getElementById('name');
    var emailInput = document.getElementById('email');
    var phoneInput = document.getElementById('phone');
    var passwordInput = document.getElementById('password');
    var signupBtn = document.getElementById('signup-btn');
    var notificationArea = document.getElementById('notification-area');
    function showNotification(message, type) {
      if (!type) type = 'info';
      if (!notificationArea) { alert(message); return; }
      var colors = { error: 'bg-error text-on-error', success: 'bg-success text-white', info: 'bg-primary text-on-primary' };
      var icons = { error: 'error', success: 'check_circle', info: 'info' };
      var alertBox = document.createElement('div');
      alertBox.className = (colors[type] || colors.info) + ' px-4 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2 fade-in pointer-events-auto';
      alertBox.innerHTML = '<span class="material-symbols-outlined text-lg">' + (icons[type] || icons.info) + '</span><span>' + message + '</span>';
      notificationArea.appendChild(alertBox);
      setTimeout(function() { alertBox.style.opacity = '0'; alertBox.style.transform = 'translateY(-10px)'; setTimeout(function() { alertBox.remove(); }, 300); }, 5000);
    }
    function validateEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email).toLowerCase()); }
    function showError(field, msg) { var el = document.getElementById(field + '-error'); if (el) { el.textContent = msg; el.classList.remove('hidden'); } }
    function clearErrors() { var errors = document.querySelectorAll('[id$="-error"]'); for (var i = 0; i < errors.length; i++) { errors[i].textContent = ''; errors[i].classList.add('hidden'); } }
    function setLoading(loading) {
      signupBtn.disabled = loading;
      if (loading) { signupBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Creating...'; }
      else { signupBtn.innerHTML = '<span>Create Account</span><span class="material-symbols-outlined text-xl">add_circle</span>'; }
    }
    async function handleSignup(e) {
      e.preventDefault();
      clearErrors();
      var business = businessInput.value.trim();
      var name = nameInput.value.trim();
      var email = emailInput.value.trim();
      var phone = phoneInput.value.trim();
      var password = passwordInput.value;
      if (!business) { showError('business', 'Business name is required'); return; }
      if (!name) { showError('name', 'Your name is required'); return; }
      if (!email) { showError('email', 'Email is required'); return; }
      if (!validateEmail(email)) { showError('email', 'Please enter a valid email'); return; }
      if (!password) { showError('password', 'Password is required'); return; }
      if (password.length < 6) { showError('password', 'Password must be at least 6 characters'); return; }
      setLoading(true);
      try {
        if (!supabaseClient) { throw new Error('Supabase not initialized'); }
        var result = await supabaseClient.auth.signUp({
          email: email,
          password: password,
          options: {
            data: {
              business_name: business,
              registrant_name: name,
              phone: phone || null
            }
          }
        });
        if (result.error) { throw result.error; }
        showNotification('Account created! Redirecting...', 'success');
        setTimeout(function() { window.location.href = CONFIG.redirectAfterSignup; }, 1500);
      } catch (err) {
        console.error('Signup error:', err);
        var msg = 'Signup failed. Please try again.';
        if (err.message && err.message.includes('User already registered')) { msg = 'An account with this email already exists'; showError('email', msg); }
        else if (err.message) { msg = err.message; }
        showNotification(msg, 'error');
      } finally { setLoading(false); }
    }
    if (form) { form.addEventListener('submit', handleSignup); }
    if (emailInput) { emailInput.addEventListener('blur', function() { if (emailInput.value && !validateEmail(emailInput.value)) { showError('email', 'Please enter a valid email'); } else { var el = document.getElementById('email-error'); if (el) el.classList.add('hidden'); } }); }
    if (passwordInput) { passwordInput.addEventListener('blur', function() { if (passwordInput.value && passwordInput.value.length < 6) { showError('password', 'Password must be at least 6 characters'); } else { var el = document.getElementById('password-error'); if (el) el.classList.add('hidden'); } }); }
    async function checkAuth() {
      if (!supabaseClient) return;
      try {
        var result = await supabaseClient.auth.getSession();
        if (result.data && result.data.session) { window.location.href = CONFIG.redirectAfterSignup; }
      } catch (e) { console.error('Auth check failed:', e); }
    }
    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', checkAuth); } else { checkAuth(); }
  </script>
</body>
</html>
