<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Login - Six7 Invoicing</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0A2540", "primary-container": "#001c37", "primary-fixed": "#d2e4ff",
            "on-primary": "#ffffff", "surface": "#f7fafc", "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f1f4f6", "on-surface": "#181c1e", "on-surface-variant": "#43474d",
            "outline-variant": "#c4c6ce", "error": "#ba1a1a", "on-error": "#ffffff", "success": "#2ecc71"
          },
          fontFamily: { "sans": ["Inter", "sans-serif"] },
          borderRadius: { "xl": "0.75rem" }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { background-color: #f7fafc; background-image: radial-gradient(at 0% 0%, rgba(210, 228, 255, 0.4) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(209, 228, 251, 0.3) 0px, transparent 50%); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="text-on-surface min-h-screen flex items-center justify-center p-4 md:p-6">
  <div id="notification-area" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>
  <div class="w-full max-w-[440px] flex flex-col items-center fade-in">
    <!-- Brand -->
    <div class="mb-8 md:mb-10 text-center">
      <div class="w-16 h-16 md:w-20 md:h-20 bg-primary rounded-xl md:rounded-full flex items-center justify-center mb-4 md:mb-6 mx-auto shadow-lg shadow-primary/20">
        <span class="material-symbols-outlined text-on-primary text-3xl md:text-4xl">account_balance_wallet</span>
      </div>
      <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-primary mb-2">Six7 Invoicing</h1>
      <p class="text-sm md:text-base text-on-surface-variant font-medium">Precision Invoicing for Sri Lankan SMEs</p>
    </div>
    <!-- Login Card -->
    <div class="w-full bg-surface-container-lowest rounded-xl md:rounded-2xl p-6 md:p-10 shadow-[0_20px_40px_rgba(0,15,34,0.04)] border border-outline-variant/20">
      <form id="login-form" class="space-y-5" novalidate>
        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="email">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant/60">mail</span>
            </div>
            <input class="block w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-0 rounded-xl text-on-surface font-medium focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="email" type="email" placeholder="name@business.lk" required autocomplete="email"/>
          </div>
          <p id="email-error" class="text-error text-xs px-1 hidden"></p>
        </div>
        <div class="space-y-2">
          <div class="flex items-center justify-between px-1">
            <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
            <a class="text-xs font-bold text-primary hover:underline" href="#" onclick="showNotification('Password reset coming soon', 'info'); return false;">Forgot Password?</a>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant/60">lock</span>
            </div>
            <input class="block w-full pl-12 pr-12 py-3.5 bg-surface-container-low border-0 rounded-xl text-on-surface font-medium focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="password" type="password" placeholder="••••••••" required autocomplete="current-password" minlength="6"/>
            <button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant/60 hover:text-primary transition-colors" type="button" id="toggle-password" aria-label="Toggle password visibility">
              <span class="material-symbols-outlined">visibility</span>
            </button>
          </div>
          <p id="password-error" class="text-error text-xs px-1 hidden"></p>
        </div>
        <button class="w-full py-3.5 bg-primary text-on-primary rounded-xl font-bold text-base shadow-lg hover:shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2 disabled:opacity-50" type="submit" id="login-btn">
          <span>Sign In</span>
          <span class="material-symbols-outlined text-xl">arrow_forward</span>
        </button>
      </form>
      <div class="mt-6 pt-6 border-t border-outline-variant/10 text-center">
        <p class="text-sm text-on-surface-variant">
          Don't have an account? 
          <a class="font-bold text-primary hover:underline" href="/signup">Create Account</a>
        </p>
      </div>
      <div class="mt-4 text-center">
        <p class="text-xs text-on-surface-variant">© 2026 Six7 Invoicing</p>
      </div>
    </div>
  </div>

  <script>
    // --- Config ---
    const CONFIG = {
      supabaseUrl: 'https://hsjhuiyyxotsyqjncvvm.supabase.co',
      supabaseKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhzamh1aXl5eG90c3lxam5jdnZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTA0MDMsImV4cCI6MjA5MDI4NjQwM30.p-CXtR_bY20n1fq8hz1hvpWu9gNT3dWPoVs7NNiwhRY',
      redirectAfterLogin: '/dashboard'
    };

    // --- Init Supabase ---
    let supabaseClient;
    try {
      if (typeof window.supabase !== 'undefined') {
        supabaseClient = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);
        console.log('✅ Supabase initialized');
      }
    } catch (e) { console.error('❌ Supabase init failed:', e); }

    // --- DOM Elements ---
    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const togglePwd = document.getElementById('toggle-password');
    const notificationArea = document.getElementById('notification-area');

    // --- Notifications ---
    function showNotification(message, type = 'info') {
      if (!notificationArea) return;
      const colors = { error: 'bg-error text-on-error', success: 'bg-success text-white', info: 'bg-primary text-on-primary' };
      const icons = { error: 'error', success: 'check_circle', info: 'info' };
      const alert = document.createElement('div');
      alert.className = `${colors[type] || colors.info} px-4 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2 fade-in pointer-events-auto`;
      alert.innerHTML = `<span class="material-symbols-outlined text-lg">${icons[type] || icons.info}</span><span>${message}</span>`;
      notificationArea.appendChild(alert);
      setTimeout(() => { alert.style.opacity = '0'; alert.style.transform = 'translateY(-10px)'; setTimeout(() => alert.remove(), 300); }, 5000);
    }

    // --- Validation ---
    function validateEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email).toLowerCase()); }
    function showError(field, msg) { const el = document.getElementById(field + '-error'); if (el) { el.textContent = msg; el.classList.remove('hidden'); } }
    function clearErrors() { document.querySelectorAll('[id$="-error"]').forEach(el => { el.textContent = ''; el.classList.add('hidden'); }); }

    // --- Loading State ---
    function setLoading(loading) {
      loginBtn.disabled = loading;
      loginBtn.innerHTML = loading ? '<span class="material-symbols-outlined animate-spin">progress_activity</span> Signing in...' : '<span>Sign In</span><span class="material-symbols-outlined text-xl">arrow_forward</span>';
    }

    // --- Login Handler ---
    async function handleLogin(e) {
      e.preventDefault();
      clearErrors();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      
      // Validate
      if (!email) { showError('email', 'Email is required'); return; }
      if (!validateEmail(email)) { showError('email', 'Please enter a valid email'); return; }
      if (!password) { showError('password', 'Password is required'); return; }
      if (password.length < 6) { showError('password', 'Password must be at least 6 characters'); return; }
      
      setLoading(true);
      
      try {
        if (!supabaseClient) throw new Error('Supabase not initialized');
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
        
        showNotification('Login successful! Redirecting...', 'success');
        setTimeout(() => { window.location.href = CONFIG.redirectAfterLogin; }, 1000);
      } catch (err) {
        console.error('Login error:', err);
        let msg = 'Login failed. Please try again.';
        if (err.message?.includes('Invalid login credentials')) { msg = 'Invalid email or password'; showError('password', msg); }
        else if (err.message?.includes('Email not confirmed')) { msg = 'Please confirm your email first'; showNotification('Check your email for the confirmation link', 'info'); }
        else if (err.message) { msg = err.message; }
        showNotification(msg, 'error');
      } finally {
        setLoading(false);
      }
    }

    // --- Event Listeners ---
    form.addEventListener('submit', handleLogin);
    
    togglePwd.addEventListener('click', function() {
      const isPwd = passwordInput.type === 'password';
      passwordInput.type = isPwd ? 'text' : 'password';
      this.querySelector('.material-symbols-outlined').textContent = isPwd ? 'visibility_off' : 'visibility';
    });

    // --- Auth Check ---
    async function checkAuth() {
      if (!supabaseClient) return;
      try {
        const { data } = await supabaseClient.auth.getSession();
        if (data?.session) { window.location.href = CONFIG.redirectAfterLogin; }
      } catch (e) { console.error('Auth check failed:', e); }
    }
    
    document.addEventListener('DOMContentLoaded', checkAuth);
  </script>
</body>
</html>
