<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Login - Six7 Invoicing</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0A2540", "primary-container": "#001c37", "primary-fixed": "#d2e4ff",
            "on-primary": "#ffffff", "surface": "#f7fafc", "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f1f4f6", "on-surface": "#181c1e", "on-surface-variant": "#43474d",
            "outline-variant": "#c4c6ce", "error": "#ba1a1a", "on-error": "#ffffff", "success": "#2ECC71"
          },
          fontFamily: { "sans": ["Inter", "sans-serif"] },
          borderRadius: { "xl": "0.75rem" }
        },
      },
    }
  </script>

  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { background-color: #f7fafc; background-image: radial-gradient(at 0% 0%, rgba(210, 228, 255, 0.4) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(209, 228, 251, 0.3) 0px, transparent 50%); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
  </style>
</head>
<body class="text-on-surface min-h-screen flex items-center justify-center p-4 md:p-6">

  <div class="w-full max-w-[440px] flex flex-col items-center">
    
    <!-- Brand Identity -->
    <div class="mb-8 md:mb-10 text-center">
      <div class="w-16 h-16 md:w-20 md:h-20 bg-primary rounded-xl md:rounded-full flex items-center justify-center mb-4 md:mb-6 mx-auto shadow-lg shadow-primary/20">
        <span class="material-symbols-outlined text-on-primary text-3xl md:text-4xl">account_balance_wallet</span>
      </div>
      <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-primary mb-2">Six7 Invoicing</h1>
      <p class="text-sm md:text-base text-on-surface-variant font-medium">Precision Invoicing for Sri Lankan SMEs</p>
    </div>

    <!-- Login Card -->
    <div class="w-full bg-surface-container-lowest rounded-xl md:rounded-2xl p-6 md:p-10 shadow-[0_20px_40px_rgba(0,15,34,0.04)] border border-outline-variant/20">
      
      <!-- Toggle: Login / Signup -->
      <div class="flex mb-6 bg-surface-container-low rounded-lg p-1">
        <button id="tab-login" class="flex-1 py-2.5 text-sm font-bold rounded-md bg-white text-primary shadow-sm transition-all">Sign In</button>
        <button id="tab-signup" class="flex-1 py-2.5 text-sm font-bold rounded-md text-on-surface-variant hover:text-on-surface transition-all">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="space-y-5">
        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="login-email">Email Address</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant/60">mail</span>
            </div>
            <input class="block w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-0 rounded-xl text-on-surface font-medium focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="login-email" type="email" placeholder="name@business.lk" required autocomplete="email"/>
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex items-center justify-between px-1">
            <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="login-password">Password</label>
            <a class="text-xs font-bold text-primary hover:underline" href="#">Forgot Password?</a>
          </div>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant/60">lock</span>
            </div>
            <input class="block w-full pl-12 pr-12 py-3.5 bg-surface-container-low border-0 rounded-xl text-on-surface font-medium focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="login-password" type="password" placeholder="••••••••" required autocomplete="current-password"/>
            <button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant/60 hover:text-primary transition-colors" type="button" id="toggle-password">
              <span class="material-symbols-outlined">visibility</span>
            </button>
          </div>
        </div>

        <button class="w-full py-3.5 bg-primary text-on-primary rounded-xl font-bold text-base shadow-lg hover:shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit" id="login-btn">
          <span>Sign In</span>
          <span class="material-symbols-outlined text-xl">arrow_forward</span>
        </button>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" class="space-y-5 hidden">
        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="signup-email">Email Address *</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant/60">mail</span>
            </div>
            <input class="block w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-0 rounded-xl text-on-surface font-medium focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="signup-email" type="email" placeholder="name@business.lk" required autocomplete="email"/>
          </div>
        </div>
        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="signup-password">Password *</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant/60">lock</span>
            </div>
            <input class="block w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-0 rounded-xl text-on-surface font-medium focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="signup-password" type="password" placeholder="Min. 8 characters" required autocomplete="new-password"/>
          </div>
        </div>
        <div class="space-y-2">
          <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="signup-business">Business Name *</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant/60">business</span>
            </div>
            <input class="block w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-0 rounded-xl text-on-surface font-medium focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="signup-business" type="text" placeholder="Six7 Solutions" required/>
          </div>
        </div>
        <button class="w-full py-3.5 bg-primary text-on-primary rounded-xl font-bold text-base shadow-lg hover:shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit" id="signup-btn">
          <span>Create Account</span>
          <span class="material-symbols-outlined text-xl">add_circle</span>
        </button>
      </form>

      <!-- Footer -->
      <div class="mt-8 pt-6 border-t border-outline-variant/10 text-center">
        <p class="text-xs text-on-surface-variant">Protected by Six7 Security. <br/>© 2026 Six7 Invoicing.</p>
      </div>
    </div>
  </div>

  <!-- Notification Area -->
  <div id="notification-area" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <!-- ALL LOGIC IN ONE PLACE -->
  <script>
    // 1. CONFIGURATION
    const SUPABASE_URL = 'https://hsjhuiyyxotsyqjncvvm.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhzamh1aXl5eG90c3lxam5jdnZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTA0MDMsImV4cCI6MjA5MDI4NjQwM30.p-CXtR_bY20n1fq8hz1hvpWu9gNT3dWPoVs7NNiwhRY';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log('✅ Six7 Supabase client initialized');

    // 2. UI HELPERS
    function showNotification(message, type = 'info') {
      let notif = document.getElementById('notification-area');
      const alert = document.createElement('div');
      const bgColor = type === 'error' ? 'bg-error text-on-error' : type === 'success' ? 'bg-success text-white' : 'bg-primary text-on-primary';
      alert.className = bgColor + ' px-6 py-3 rounded-xl shadow-lg text-sm font-bold transform transition-all duration-300 translate-x-full opacity-0';
      alert.textContent = message;
      notif.appendChild(alert);
      requestAnimationFrame(function() {
        alert.classList.remove('translate-x-full', 'opacity-0');
      });
      setTimeout(function() {
        alert.classList.add('translate-x-full', 'opacity-0');
        setTimeout(function() { alert.remove(); }, 300);
      }, 4000);
    }

    // 3. AUTH FUNCTIONS
    async function handleLogin(email, password) {
      try {
        const result = await supabaseClient.auth.signInWithPassword({
          email: email.trim(),
          password: password
        });
        if (result.error) { throw result.error; }
        showNotification('Login successful! Redirecting...', 'success');
        setTimeout(function() {
          window.location.href = '../dashboard/';
        }, 1000);
      } catch (err) {
        showNotification(err.message || 'Login failed', 'error');
        console.error('Login error:', err);
      }
    }

    async function handleSignup(email, password, businessName) {
      try {
        const result = await supabaseClient.auth.signUp({
          email: email.trim(),
          password: password,
          options: {
             {
              business_name: businessName
            }
          }
        });
        if (result.error) { throw result.error; }
        
        // Update profile with business name
        if (result.data && result.data.user) {
          await supabaseClient.from('profiles').update({
            business_name: businessName
          }).eq('id', result.data.user.id);
        }
        
        showNotification('Account created! Check email to confirm.', 'success');
      } catch (err) {
        showNotification(err.message || 'Signup failed', 'error');
        console.error('Signup error:', err);
      }
    }

    // 4. EVENT LISTENERS
    document.addEventListener('DOMContentLoaded', function() {
      // Check if already logged in
      supabaseClient.auth.getSession().then(function(r) {
        if (r.data && r.data.session) {
          window.location.href = '../dashboard/';
        }
      });

      // Tab Switching
      var loginForm = document.getElementById('login-form');
      var signupForm = document.getElementById('signup-form');
      var tabLogin = document.getElementById('tab-login');
      var tabSignup = document.getElementById('tab-signup');
      
      tabLogin.addEventListener('click', function(e) {
        e.preventDefault();
        loginForm.classList.remove('hidden'); 
        signupForm.classList.add('hidden');
        tabLogin.classList.add('bg-white', 'text-primary', 'shadow-sm'); 
        tabLogin.classList.remove('text-on-surface-variant');
        tabSignup.classList.remove('bg-white', 'text-primary', 'shadow-sm'); 
        tabSignup.classList.add('text-on-surface-variant');
      });
      
      tabSignup.addEventListener('click', function(e) {
        e.preventDefault();
        signupForm.classList.remove('hidden'); 
        loginForm.classList.add('hidden');
        tabSignup.classList.add('bg-white', 'text-primary', 'shadow-sm'); 
        tabSignup.classList.remove('text-on-surface-variant');
        tabLogin.classList.remove('bg-white', 'text-primary', 'shadow-sm'); 
        tabLogin.classList.add('text-on-surface-variant');
      });

      // Password Toggle
      document.getElementById('toggle-password').addEventListener('click', function() {
        var input = document.getElementById('login-password');
        var icon = this.querySelector('.material-symbols-outlined');
        if (input.type === 'password') { 
          input.type = 'text'; 
          icon.textContent = 'visibility_off'; 
        } else { 
          input.type = 'password'; 
          icon.textContent = 'visibility'; 
        }
      });

      // Login Form Submit
      document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var btn = document.getElementById('login-btn');
        var original = btn.innerHTML;
        btn.disabled = true; 
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Signing in...';
        handleLogin(
          document.getElementById('login-email').value, 
          document.getElementById('login-password').value
        ).then(function() {
          btn.disabled = false; 
          btn.innerHTML = original;
        });
      });

      // Signup Form Submit
      document.getElementById('signup-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var btn = document.getElementById('signup-btn');
        var original = btn.innerHTML;
        btn.disabled = true; 
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Creating...';
        handleSignup(
          document.getElementById('signup-email').value,
          document.getElementById('signup-password').value,
          document.getElementById('signup-business').value
        ).then(function() {
          btn.disabled = false; 
          btn.innerHTML = original;
        });
      });
    });
  </script>
</body>
</html>
